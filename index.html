<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">
    <div class="dot">
        <h2>GST Calculator</h2>
        <button class="dots" onclick="openHistory()">⋮</button>
     </div>
    <div  id="display">0</div>  
    <div class="buttons">
      <div class="gst">
           <div class="gst1">
                <button class="GST-Contain" onclick="addGST('3')">+3%</button>
                <button class="GST-Contain" onclick="addGST('5')">+5%</button>
                <button class="GST-Contain" onclick="addGST('12')">+12%</button>
                <button class="GST-Contain" onclick="addGST('18')">+18%</button>
                <button class="GST-Contain" onclick="addGST('28')">+28%</button>
            </div>

            <div class="gst2">
                <button class="GST-Contain" onclick="removeGST('3')">-3%</button>
                <button class="GST-Contain" onclick="removeGST('5')">-5%</button>
                <button class="GST-Contain" onclick="removeGST('12')">-12%</button>
                <button class="GST-Contain" onclick="removeGST('18')">-18%</button>
                <button class="GST-Contain" onclick="removeGST('28')">-28%</button>
             </div>
        </div>

        <div class="simple">
            <button class="operator" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="deleteChar()">⌫</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('00')">00</button>
            <button onclick="appendNumber('0')">0</button>
